# ============================================================================
# Sauvegarde automatique de la base Supabase
# ----------------------------------------------------------------------------
# Le plan gratuit Supabase ne fait AUCUNE sauvegarde ("Last backup: No
# backups"). Ce workflow exporte toute la base chaque dimanche et conserve
# l'archive 90 jours dans les artefacts GitHub Actions.
#
# Le repo etant public, le dump est CHIFFRE (AES-256) avant upload : sans la
# passphrase, l'artefact est illisible.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   SUPABASE_DB_URL    : URI "Session pooler" de Supabase (bouton Connect),
#                        avec le mot de passe de la base inclus.
#                        Ex: postgresql://postgres.hhqgnzlwgtuxcmpkouen:MOTDEPASSE@aws-0-eu-west-1.pooler.supabase.com:5432/postgres
#   BACKUP_PASSPHRASE  : mot de passe de chiffrement des sauvegardes
#                        (a garder precieusement : sans lui, pas de restauration)
#
# Restauration : voir GUIDE_SAUVEGARDE.md a la racine du repo.
# ============================================================================

name: Sauvegarde base de donnees

on:
  schedule:
    - cron: '0 2 * * 0' # chaque dimanche a 02:00 UTC (03:00 Alger)
  workflow_dispatch: {} # bouton "Run workflow" pour lancer a la main

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Installer le client PostgreSQL 17
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Exporter la base (pg_dump)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Secret SUPABASE_DB_URL manquant — ajoutez-le dans Settings → Secrets and variables → Actions"
            exit 1
          fi
          STAMP=$(date -u +%Y-%m-%d_%H%M)
          # --format=custom : format compresse de pg_dump, restaurable avec pg_restore
          pg_dump          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file="backup_${STAMP}.dump"
          ls -lh backup_*.dump

      - name: Chiffrer la sauvegarde (AES-256)
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          if [ -z "$BACKUP_PASSPHRASE" ]; then
            echo "::error::Secret BACKUP_PASSPHRASE manquant — ajoutez-le dans Settings → Secrets and variables → Actions"
            exit 1
          fi
          for f in backup_*.dump; do
            gpg --batch --yes --symmetric --cipher-algo AES256 \
                --passphrase "$BACKUP_PASSPHRASE" "$f"
            rm -f "$f" # on ne garde que la version chiffree
          done
          ls -lh backup_*.dump.gpg

      - name: Conserver l'artefact (90 jours)
        uses: actions/upload-artifact@v4
        with:
          name: sauvegarde-supabase-${{ github.run_number }}
          path: backup_*.dump.gpg
          retention-days: 90
          if-no-files-found: error
